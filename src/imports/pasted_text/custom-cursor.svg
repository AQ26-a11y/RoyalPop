Salva questo SVG come `cursor-default.svg` e usalo come cursore CSS:
```css
* { cursor: url('cursor-default.svg') 10 2, auto; }
```
L'hotspot `10 2` posiziona il punto attivo sulla punta superiore della freccia.

### Implementazione JavaScript del cursore
Non usare il CSS `cursor:` nativo per i cambi di stato — è troppo lento e non permette animazioni. Usa invece un elemento DOM che segue il mouse:

```html
<!-- Nel <body>, primo figlio -->
<div id="cursor-wrapper" aria-hidden="true">
  <div id="cursor-svg">
    <!-- Incolla qui l'SVG sopra -->
  </div>
  <div id="cursor-label"></div>
</div>
```

```css
body { cursor: none; }

#cursor-wrapper {
  position: fixed;
  top: 0; left: 0;
  pointer-events: none;
  z-index: 99999;
  /* L'SVG ha hotspot in alto a sinistra — nessun offset aggiuntivo */
}

#cursor-svg {
  width: 48px; height: 48px;
  transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
              opacity 0.2s ease;
  transform-origin: top left;
}

#cursor-label {
  position: absolute;
  top: 44px; left: 8px;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  font-size: 11px;  /* sotto --text-xsmall per UI cursore */
  letter-spacing: -0.02em;
  text-transform: uppercase;
  color: #191919;
  white-space: nowrap;
  opacity: 0;
  transition: opacity 0.2s ease;
}

/* Stato: hover su link/button */
#cursor-wrapper[data-state="hover"] #cursor-svg {
  transform: scale(0.75);
}

/* Stato: drag carousel */
#cursor-wrapper[data-state="drag"] #cursor-svg {
  transform: rotate(90deg) scale(1.1);
}
#cursor-wrapper[data-state="drag"] #cursor-label {
  opacity: 1;
  content: "DRAG";
}
/* Imposta il testo via JS: cursorLabel.textContent = 'DRAG ←→' */

/* Stato: video fullscreen */
#cursor-wrapper[data-state="video"] #cursor-svg {
  opacity: 0;
}
#cursor-wrapper[data-state="video"] #cursor-label {
  opacity: 1;
  font-size: 13px;
  /* JS: '▶ PLAY' oppure '⏸ PAUSE' in base allo stato video */
}

/* Nascondi su touch */
@media (hover: none) {
  #cursor-wrapper { display: none; }
  body { cursor: auto; }
}
```

```javascript
const wrapper = document.getElementById('cursor-wrapper')
const label   = document.getElementById('cursor-label')
let mouseX = 0, mouseY = 0

document.addEventListener('mousemove', e => {
  mouseX = e.clientX
  mouseY = e.clientY
  wrapper.style.transform = `translate(${mouseX}px, ${mouseY}px)`
})

// Cambio stato contestuale
document.querySelectorAll('a, button').forEach(el => {
  el.addEventListener('mouseenter', () => wrapper.dataset.state = 'hover')
  el.addEventListener('mouseleave', () => wrapper.dataset.state = 'default')
})

document.querySelectorAll('[data-cursor="drag"]').forEach(el => {
  el.addEventListener('mouseenter', () => {
    wrapper.dataset.state = 'drag'
    label.textContent = 'DRAG ←→'
  })
  el.addEventListener('mouseleave', () => {
    wrapper.dataset.state = 'default'
    label.textContent = ''
  })
})

// Video fullscreen
const videoSection = document.getElementById('video-fullscreen')
if (videoSection) {
  videoSection.addEventListener('mouseenter', () => {
    wrapper.dataset.state = 'video'
    label.textContent = '▶ PLAY'
  })
  videoSection.addEventListener('mouseleave', () => {
    wrapper.dataset.state = 'default'
  })
  videoSection.addEventListener('click', () => {
    const video = videoSection.querySelector('video')
    if (video.paused) {
      video.play()
      label.textContent = '⏸ PAUSE'
    } else {
      video.pause()
      label.textContent = '▶ PLAY'
    }
  })
}
```

> **Nota estetica:** la freccia pixel-art è volutamente retro e pop — richiama i cursori dei primi computer degli anni '80, perfettamente coerente con il tema "Pop Never Stops". Su sfondo scuro (sezioni nere), inverti il fill SVG a bianco usando `filter: invert(1)` sul wrapper.

```javascript
// Inverti il cursore nelle sezioni scure
const darkSections = document.querySelectorAll('.section-dark')
const cursorSvgEl  = document.getElementById('cursor-svg')

const darknessObserver = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) cursorSvgEl.style.filter = 'invert(1)'
    else cursorSvgEl.style.filter = 'invert(0)'
  })
}, { threshold: 0.5 })

darkSections.forEach(s => darknessObserver.observe(s))
```


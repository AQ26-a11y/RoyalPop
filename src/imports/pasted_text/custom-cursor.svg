## CURSORE CUSTOM — SPECIFICA COMPLETA

> **Riferimento visivo:** il cursore è un'icona SVG personalizzata a forma di freccia pixel-art / retro digitale, coerente con l'estetica pop del progetto. Di seguito il codice SVG esatto da usare come cursore default.


#### Titoloni fullwidth — adattamento responsivo

I titoloni `title-big` sono progettati a 144px su desktop. Per adattarli ai breakpoint
senza perdere il comportamento "riempie il viewport", usa `clamp` + `vw` con calcolo
basato sulle proporzioni originali (144px su ~1440px desktop = ~10vw):

```css
.title-big {
  font-size: clamp(
    48px,          /* minimum: non scende sotto 48px (= --title-small-size) */
    10vw,          /* fluid: proporzionale al viewport */
    144px          /* maximum: il valore di design originale */
  );
  line-height: 0.86;  /* 124/144 = 0.861 — mantieni il ratio anche in fluid */
  letter-spacing: -0.01em;
  white-space: nowrap; /* riga singola — NON wrappare i titoloni hero */
}

/* Eccezione: titoloni multi-riga (sez. 03, sez. 07) */
.title-big.multiline {
  white-space: normal;
  font-size: clamp(36px, 4.5vw, 80px); /* ridotto perché su più righe */
  line-height: 0.86;
}
```

#### Assegnazione per sezione

```
SEZIONE 01 Hero
  "THE NEW ROYAL POP"        → .title-big  (fullwidth, white-space: nowrap)
  "POP NEVER STOPS"          → .title-big  (fullwidth, "POP" in accent #E8321A)

SEZIONE 02 Titolone
  "AUDEMARS PIGUET & SWATCH" → .title-big  (fullwidth, su sfondo #191919, colore #FFF)

SEZIONE 03
  Titolo colonna sinistra    → .title-big .multiline
  Body copy                  → .text-big

SEZIONE 04 Titolone
  "SCOPRI LA COLLEZIONE..."  → .title-big  (fullwidth)
  Nome variante sotto card   → .title-small

SEZIONE 05 Pillole
  Nome materiale (BIOCERAMIC ecc.) → .title-small
  Descrizione pillola        → .text-small

SEZIONE 06 Titolone
  "UNA NUOVA INTERPRETAZIONE
   DELL'OROLOGIO DA TASCA"   → .title-big .multiline (sfondo scuro)

SEZIONE 07
  "PRONTO A FARE COLPO..."   → .title-big .multiline
  Body copy                  → .text-small
  CTA label                  → .text-xsmall (uppercase, letter-spacing: 0.1em)

NAVIGATION STICKY
  Logo label / micro-testo   → .text-xsmall
  CTA "Find a Store"         → .text-xsmall (uppercase)
  CTA "Buy Now"              → .text-xsmall (uppercase)
```

#### Caricamento font

BBH Bogle è un font proprietario — deve essere fornito come file `.woff2`.
Caricalo con `@font-face` prima di qualsiasi altro stile:

```css
@font-face {
  font-family: 'BBH Bogle';
  src: url('/fonts/BBHBogle-Bold.woff2') format('woff2'),
       url('/fonts/BBHBogle-Bold.woff')  format('woff');
  font-weight: 700;
  font-style: normal;
  font-display: swap;   /* evita FOIT — mostra fallback Impact durante il caricamento */
}
```

> **Fallback importante:** se BBH Bogle non è ancora caricato al momento dell'animazione
> mask reveal, SplitType misurerà le dimensioni del testo fallback (Impact) — larghezze diverse.
> Soluzione: inizializza SplitType **solo dopo** `document.fonts.ready`:
> ```javascript
> document.fonts.ready.then(() => {
>   const split = new SplitType('.hero-title', { types: 'words' })
>   // poi lancia le animazioni GSAP
> })
> ```

